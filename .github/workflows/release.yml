name: Release NetShelfy+ APK

# Trigger: push tag dengan format v1.0.0 atau v1.0.0+2
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Python
        run: python3 --version

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      # Update versionName + versionCode di pubspec.yaml dari tag
      # Tag format: v1.2.0 → version: 1.2.0+{github_run_number}
      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"            # misal v1.2.0
          VERSION="${TAG#v}"                  # misal 1.2.0
          BUILD="${GITHUB_RUN_NUMBER}"        # auto increment
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD=$BUILD"     >> $GITHUB_ENV
          # Update pubspec.yaml
          sed -i "s/^version:.*/version: $VERSION+$BUILD/" pubspec.yaml
          echo "pubspec version updated: $VERSION+$BUILD"
          cat pubspec.yaml | grep "^version:"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (non-fatal)
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK Release
        run: flutter build apk --release

      # Buat GitHub Release dan upload APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "NetShelfy+ ${{ env.VERSION }}"
          body: |
            ## NetShelfy+ ${{ env.VERSION }} (build ${{ env.BUILD }})

            ### Cara Install
            1. Download `app-release.apk` di bawah
            2. Install di HP Android
            3. Atau buka app → notif update otomatis muncul

            ### Changelog
            **♻️ Changes**
            - Project renamed from UploadServer to Netshelfy
            - Package ID changed: `com.uploadserver.app` → `com.twos.netshelfy.verseapp`

            **🚀 New**
            - Added `foreground_service.dart` — server now runs persistently
              in the background via `flutter_foreground_task`
            - Added `ic_launcher_foreground.png` assets across all mipmap
              densities (hdpi / mdpi / xhdpi / xxhdpi / xxxhdpi)

            **🔧 Updated**
            - `pubspec.yaml`: added `flutter_foreground_task ^8.0.1`
            - `LICENSE`: added `flutter_foreground_task` as acknowledged
              third-party component
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
