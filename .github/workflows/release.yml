name: Release NetShelfy+ APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Python
        run: python3 --version

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          VERSION="${VERSION%%+*}"
          BUILD="${GITHUB_RUN_NUMBER}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD=$BUILD"     >> $GITHUB_ENV
          sed -i "s/^version:.*/version: $VERSION+$BUILD/" pubspec.yaml
          echo "pubspec version: $VERSION+$BUILD"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (non-fatal)
        run: flutter analyze --no-fatal-infos || true

      # ── Build Universal (semua ABI dalam 1 APK) ──────────────────
      - name: Build APK Universal
        run: flutter build apk --release

      # ── Build per-ABI ────────────────────────────────────────────
      - name: Build APK arm64-v8a
        run: flutter build apk --release --target-platform android-arm64

      - name: Build APK armeabi-v7a
        run: flutter build apk --release --target-platform android-arm

      - name: Build APK x86_64
        run: flutter build apk --release --target-platform android-x64

      - name: Build APK x86
        run: flutter build apk --release --target-platform android-x86

      # ── Rename APK ───────────────────────────────────────────────
      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          cp app-release.apk           netshelfy-${{ env.VERSION }}-universal.apk
          cp app-arm64-v8a-release.apk netshelfy-${{ env.VERSION }}-arm64-v8a.apk
          cp app-armeabi-v7a-release.apk netshelfy-${{ env.VERSION }}-armeabi-v7a.apk
          cp app-x86_64-release.apk    netshelfy-${{ env.VERSION }}-x86_64.apk
          cp app-x86-release.apk       netshelfy-${{ env.VERSION }}-x86.apk
          ls -lh *.apk

      # ── Upload ke GitHub Release ──────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "NetShelfy+ ${{ env.VERSION }}"
          body: |
            ## NetShelfy+ ${{ env.VERSION }} (build ${{ env.BUILD }})

            ### Download
            | File | Untuk |
            |------|-------|
            | `netshelfy-*-universal.apk` | Semua HP (direkomendasikan) |
            | `netshelfy-*-arm64-v8a.apk` | HP modern 64-bit |
            | `netshelfy-*-armeabi-v7a.apk` | HP lama 32-bit |
            | `netshelfy-*-x86_64.apk` | Emulator 64-bit |
            | `netshelfy-*-x86.apk` | Emulator 32-bit |

            ### Cara Install
            1. Download APK sesuai HP kamu
            2. Install di HP Android
            3. Atau buka app → notif update otomatis muncul

          files: |
            build/app/outputs/flutter-apk/netshelfy-${{ env.VERSION }}-universal.apk
            build/app/outputs/flutter-apk/netshelfy-${{ env.VERSION }}-arm64-v8a.apk
            build/app/outputs/flutter-apk/netshelfy-${{ env.VERSION }}-armeabi-v7a.apk
            build/app/outputs/flutter-apk/netshelfy-${{ env.VERSION }}-x86_64.apk
            build/app/outputs/flutter-apk/netshelfy-${{ env.VERSION }}-x86.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
